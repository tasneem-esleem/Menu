    <script>
    // زر الرجوع
    document.querySelector('.arrow').onclick = (e) => {
        e.preventDefault();
        window.location.href = "menu.html";
    };

    // إظهار/إخفاء زر الرجوع عند التمرير
    window.onscroll = () => {
        const arrow = document.querySelector('.arrow');
        if (window.scrollY > 200) {
            arrow.classList.remove("opacity-0", "translate-y-10");
            arrow.classList.add("opacity-100", "translate-y-0");
        } else {
            arrow.classList.remove("opacity-100", "translate-y-0");
            arrow.classList.add("opacity-0", "translate-y-10");
        }
    };

    // جلب المنتجات من localStorage
    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    const cartMenu = document.querySelector('.cartMenu');
    const cartContainer = document.querySelector('.cartContainer');
    const productsList = document.querySelector('.products-list');

    // دالة تحديث الكمية
    function updateQuantity(index, change) {
        let items = JSON.parse(localStorage.getItem("cartItems")) || [];
        if (!items[index].quantity) items[index].quantity = 1;
        items[index].quantity += change;
        if (items[index].quantity < 1) items[index].quantity = 1;
        localStorage.setItem("cartItems", JSON.stringify(items));
        location.reload();
    }

    function removeItem(index) {
        let items = JSON.parse(localStorage.getItem("cartItems")) || [];
        items.splice(index, 1);
        localStorage.setItem("cartItems", JSON.stringify(items));
        location.reload();
    }

    // عرض المنتجات
    if (!cartItems || cartItems.length === 0) {
        cartContainer.classList.remove('hidden');
        cartMenu.classList.add('hidden');
    } else {
        cartContainer.classList.add('hidden');
        cartMenu.classList.remove('hidden');
        
        productsList.innerHTML = '';
        cartItems.forEach((item, index) => {
            let priceValue = parseFloat(item.price.toString().replace('$', ''));
            let quantity = item.quantity || 1;
            let itemTotal = priceValue * quantity;
            
            const productDiv = document.createElement('div');
            productDiv.className = 'flex items-start gap-4 pb-6 border-b border-gray-300 last:border-0 ';
            productDiv.innerHTML = `
                <div class="bg-white shrink-0 w-20 h-20 rounded-md p-1">
                    <img class="w-full h-full object-cover rounded-md" src="${item.img}" alt="${item.name}">
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-base font-semibold text-gray-800">${item.name}</h3>
                            <h4 class="text-base font-semibold text-amber-600">$${priceValue.toFixed(3)}</h4>
                        </div>
       
                    </div>
                    <div class="flex items-center justify-between mt-2 gap-5">
                        <div class="flex items-center border border-gray-300 rounded-md">
                            <button class="px-2 py-1 hover:bg-gray-200 rounded-l-md" onclick="updateQuantity(${index}, -1)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-2.5 fill-current" viewBox="0 0 124 124">
                                    <path d="M112 50H12C5.4 50 0 55.4 0 62s5.4 12 12 12h100c6.6 0 12-5.4 12-12s-5.4-12-12-12z"></path>    
                                </svg>
                            </button>
                            <span class="px-3 py-1 text-sm font-medium">${quantity}</span>
                            <button class="px-2 py-1 hover:bg-gray-200 rounded-r-md" onclick="updateQuantity(${index}, 1)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-2.5 fill-current" viewBox="0 0 42 42">
                                    <path d="M37.059 16H26V4.941C26 2.224 23.718 0 21 0s-5 2.224-5 4.941V16H4.941C2.224 16 0 18.282 0 21s2.224 5 4.941 5H16v11.059C16 39.776 18.282 42 21 42s5-2.224 5-4.941V26h11.059C39.776 26 42 23.718 42 21s-2.224-5-4.941-5z"></path>
                                </svg>
                            </button>
                        </div>
                         <button class="text-red-500 hover:text-red-700" onclick="removeItem(${index})">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 fill-red-500 inline cursor-pointer" viewBox="0 0 24 24">
          <path d="M19 7a1 1 0 0 0-1 1v11.191A1.92 1.92 0 0 1 15.99 21H8.01A1.92 1.92 0 0 1 6 19.191V8a1 1 0 0 0-2 0v11.191A3.918 3.918 0 0 0 8.01 23h7.98A3.918 3.918 0 0 0 20 19.191V8a1 1 0 0 0-1-1Zm1-3h-4V2a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v2H4a1 1 0 0 0 0 2h16a1 1 0 0 0 0-2ZM10 4V3h4v1Z" data-original="currentColor"></path>
          <path d="M11 17v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Zm4 0v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Z" data-original="currentColor"></path>
                            </svg>

                        </button>
                    </div>
                </div>
            `;
            
            productsList.appendChild(productDiv);
        });
        
        // حساب المجموع الكلي
        let subtotal = cartItems.reduce((sum, item) => {
            let priceValue = parseFloat(item.price.toString().replace('$', ''));
            return sum + (priceValue * (item.quantity || 1));
        }, 0);
        
        let discount = subtotal * 0.10;
        let total = subtotal - discount;
        
      
        document.querySelector('.subtotal').textContent = `$${subtotal.toFixed(3)}`;
        document.querySelector('.discount').textContent = `$${discount.toFixed(3)}`;
        document.querySelector('.total').textContent = `$${total.toFixed(3)}`;
    }
    </script>
