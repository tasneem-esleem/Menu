<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 16Menu</title>
    <link rel="stylesheet" href="../src/output.css">
    <link rel="stylesheet" href="../src/asastes/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="../src/asastes/image/logo (3).png" type="image/icon">
    <!-- font -->
     <link rel="preconnect" href="https://fonts.bunny.net">
     <link rel="stylesheet" href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap">
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap">
</head>
<body>
    <div class="min-h-screen flex flex-col justify-center px-4 sm:px-6 lg:px-8">
  <div class="absolute right-4 top-4 sm:right-10 sm:top-10">
    <button class="bg-gray-100 px-2 py-1 text-gray-500 cursor-pointer">En</button>
  </div>

  <div>
    <img class="w-20 sm:w-25 mx-auto mb-5" src="asastes/image/logo (3).png" alt="">
  </div>

  <div class="flex justify-center items-center">
    <div class="bg-white shadow-md w-full max-w-md sm:w-lg px-6 py-4">
        <p class="mb-4 text-sm text-gray-600">Forgot your password? No problem. Just let us know your email address and we will email you a password reset link that will allow you to choose a new one.</p>
      <form action="">
        <div>
          <label for="Email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" class="w-full border p-2 border-gray-300 rounded-md shadow-sm mt-2 outline-0" id="email" required>
        </div>
        
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mt-4">
          <button class="bg-black text-white px-4 py-2 font-semibold rounded-md shadow-md cursor-pointer mt-3 sm:mt-0 sm:ml-3 hover:bg-gray-700 transition duration-150 ease-in-out uppercase">Email Password Reset Link</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
